<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EcoPollo — Panel Administrativo</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'DM Sans', sans-serif; background: #f5f5f5; color: #1a1a1a; }
.login-container { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: linear-gradient(135deg, #6BA644 0%, #4A7C2C 100%); }
.login-box { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); max-width: 400px; width: 100%; }
.login-box h1 { text-align: center; margin-bottom: 30px; color: #4A7C2C; font-size: 28px; }
.login-box input { width: 100%; padding: 12px; margin-bottom: 20px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 16px; }
.login-box input:focus { outline: none; border-color: #6BA644; }
.login-box button { width: 100%; padding: 14px; background: #6BA644; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: 700; cursor: pointer; transition: background 0.2s; }
.login-box button:hover { background: #4A7C2C; }
.error-msg { color: #BC4749; margin-bottom: 15px; font-size: 14px; text-align: center; }

.admin-container { display: none; min-height: 100vh; }
.admin-header { background: #4A7C2C; color: white; padding: 20px; display: flex; justify-content: space-between; align-items: center; }
.admin-header h1 { font-size: 24px; }
.logout-btn { background: rgba(255,255,255,0.2); color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; }
.logout-btn:hover { background: rgba(255,255,255,0.3); }

.admin-content { padding: 20px; max-width: 1400px; margin: 0 auto; }

.stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 30px; }
.stat-card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
.stat-card h3 { color: #6BA644; font-size: 14px; text-transform: uppercase; margin-bottom: 10px; }
.stat-card .value { font-size: 36px; font-weight: 700; color: #4A7C2C; }
.stat-card .desc { font-size: 12px; color: #999; margin-top: 5px; }

.filters { background: white; padding: 20px; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); display: flex; gap: 15px; flex-wrap: wrap; }
.filters input, .filters select { padding: 10px; border: 2px solid #e0e0e0; border-radius: 6px; font-size: 14px; }
.filters button { padding: 10px 20px; background: #6BA644; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; }
.filters button:hover { background: #4A7C2C; }

.table-container { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
table { width: 100%; border-collapse: collapse; }
table thead { background: #f5f5f5; }
table th { padding: 15px; text-align: left; font-weight: 700; color: #4A7C2C; border-bottom: 2px solid #e0e0e0; }
table td { padding: 15px; border-bottom: 1px solid #e0e0e0; }
table tr:hover { background: #f9f9f9; }

.badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; }
.badge-alta { background: #d4edda; color: #155724; }
.badge-media { background: #fff3cd; color: #856404; }
.badge-baja { background: #f8d7da; color: #721c24; }

.actions { display: flex; gap: 10px; }
.btn-small { padding: 6px 12px; font-size: 12px; border: none; border-radius: 4px; cursor: pointer; }
.btn-export { background: #6BA644; color: white; }
.btn-export:hover { background: #4A7C2C; }

.empty-msg { text-align: center; padding: 40px; color: #999; }

@media (max-width: 768px) {
  .stats-grid { grid-template-columns: 1fr; }
  .filters { flex-direction: column; }
  table { font-size: 12px; }
  table th, table td { padding: 10px; }
}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-container" id="login-container">
  <div class="login-box">
    <h1>🐔 EcoPollo</h1>
    <div class="error-msg" id="error-msg"></div>
    <input type="password" id="password-input" placeholder="Contraseña" autocomplete="off">
    <button onclick="verificarPassword()">Entrar al Panel</button>
  </div>
</div>

<!-- ADMIN PANEL -->
<div class="admin-container" id="admin-container">
  <div class="admin-header">
    <h1>📊 Panel Administrativo EcoPollo</h1>
    <button class="logout-btn" onclick="logout()">Cerrar sesión</button>
  </div>

  <div class="admin-content">
    <!-- ESTADÍSTICAS -->
    <div class="stats-grid">
      <div class="stat-card">
        <h3>Total de leads</h3>
        <div class="value" id="total-leads">0</div>
      </div>
      <div class="stat-card">
        <h3>Hoy</h3>
        <div class="value" id="leads-hoy">0</div>
      </div>
      <div class="stat-card">
        <h3>Segmento más frecuente</h3>
        <div class="value" id="segmento-frecuente">-</div>
      </div>
      <div class="stat-card">
        <h3>Descuento promedio</h3>
        <div class="value" id="descuento-promedio">-</div>
      </div>
    </div>

    <!-- FILTROS -->
    <div class="filters">
      <input type="date" id="fecha-desde" placeholder="Desde">
      <input type="date" id="fecha-hasta" placeholder="Hasta">
      <select id="filtro-segmento">
        <option value="">Todos los segmentos</option>
        <option value="Cliente Final (Hogar)">Cliente Final</option>
        <option value="Sodas / Restaurantes Pequeños">Sodas / Rest. Pequeños</option>
        <option value="Restaurantes Medianos">Rest. Medianos</option>
        <option value="Hoteles / Catering">Hoteles / Catering</option>
        <option value="Mayorista / Revendedor">Mayorista</option>
      </select>
      <input type="text" id="filtro-zona" placeholder="Buscar por zona">
      <button onclick="aplicarFiltros()">Filtrar</button>
      <button onclick="limpiarFiltros()" style="background: #999;">Limpiar</button>
      <button class="btn-export" onclick="exportarExcel()">📥 Descargar Excel</button>
    </div>

    <!-- TABLA -->
    <div class="table-container">
      <table id="tabla-leads">
        <thead>
          <tr>
            <th>Fecha</th>
            <th>Nombre</th>
            <th>Zona</th>
            <th>Frecuencia</th>
            <th>Volumen</th>
            <th>Productos</th>
            <th>Segmento</th>
            <th>Descuento</th>
            <th>Confianza</th>
          </tr>
        </thead>
        <tbody id="tabla-body">
          <tr><td colspan="9" class="empty-msg">Cargando datos...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<script>
const PASSWORD = "ecopollo2024"; // ⚠️ CAMBIAR ESTO
let datosCompletos = [];

function verificarPassword() {
  const pwd = document.getElementById("password-input").value;
  const rolGuardado = localStorage.getItem("ecopollo-rol");
  
  // Viene del botón ⚙️ con rol ya guardado
  if (rolGuardado === "admin" || rolGuardado === "ceo") {
    mostrarPanel(rolGuardado);
    return;
  }
  
  // Login directo en esta página
  if (pwd === PASSWORD) {
    mostrarPanel("admin");
  } else if (pwd === "ecopollo-ceo") {
    mostrarPanel("ceo");
  } else {
    document.getElementById("error-msg").textContent = "Contraseña incorrecta";
    document.getElementById("password-input").value = "";
  }
}

function mostrarPanel(rol) {
  document.getElementById("login-container").style.display = "none";
  document.getElementById("admin-container").style.display = "block";
  localStorage.setItem("admin-logged", "true");
  
  // Mostrar badge de rol
  const header = document.querySelector(".admin-header h1");
  if (rol === "ceo") {
    header.innerHTML = "📊 Panel EcoPollo <span style='font-size:13px;background:rgba(255,255,255,0.2);padding:4px 12px;border-radius:20px;margin-left:10px;'>👔 CEO</span>";
  } else {
    header.innerHTML = "📊 Panel Administrativo EcoPollo <span style='font-size:13px;background:rgba(255,255,255,0.2);padding:4px 12px;border-radius:20px;margin-left:10px;'>🔧 Admin</span>";
  }
  
  localStorage.removeItem("ecopollo-rol");
  cargarDatos();
}

function logout() {
  localStorage.removeItem("admin-logged");
  location.reload();
}

function cargarDatos() {
  // Simular carga desde Google Sheets (en producción, usar Google Sheets API)
  // Por ahora, obtener del localStorage del formulario
  
  const leads = JSON.parse(localStorage.getItem("ecopollo-leads") || "[]");
  datosCompletos = leads;
  
  renderizarTabla(leads);
  calcularEstadisticas(leads);
}

function renderizarTabla(datos) {
  const tbody = document.getElementById("tabla-body");
  
  if (datos.length === 0) {
    tbody.innerHTML = '<tr><td colspan="9" class="empty-msg">No hay datos para mostrar</td></tr>';
    return;
  }

  tbody.innerHTML = datos.map(lead => `
    <tr>
      <td>${new Date(lead.fecha).toLocaleDateString('es-CR')}</td>
      <td><strong>${lead.nombre}</strong></td>
      <td>${lead.zona}</td>
      <td>${lead.frecuencia}</td>
      <td>${lead.volumen}</td>
      <td><small>${lead.productos.substring(0, 30)}...</small></td>
      <td>${lead.segmento}</td>
      <td><strong>${lead.descuento}%</strong></td>
      <td><span class="badge badge-${lead.confianza.toLowerCase()}">${lead.confianza}</span></td>
    </tr>
  `).join("");
}

function calcularEstadisticas(datos) {
  document.getElementById("total-leads").textContent = datos.length;

  const hoy = new Date().toDateString();
  const leadsHoy = datos.filter(d => new Date(d.fecha).toDateString() === hoy).length;
  document.getElementById("leads-hoy").textContent = leadsHoy;

  const segmentos = {};
  datos.forEach(d => {
    segmentos[d.segmento] = (segmentos[d.segmento] || 0) + 1;
  });
  const masFrequente = Object.keys(segmentos).sort((a, b) => segmentos[b] - segmentos[a])[0];
  document.getElementById("segmento-frecuente").textContent = masFrequente ? masFrequente.split(" ")[0] : "-";

  const descuentos = datos.map(d => parseInt(d.descuento)).filter(d => !isNaN(d));
  const promedio = descuentos.length ? Math.round(descuentos.reduce((a, b) => a + b) / descuentos.length) : 0;
  document.getElementById("descuento-promedio").textContent = promedio + "%";
}

function aplicarFiltros() {
  const desde = document.getElementById("fecha-desde").value;
  const hasta = document.getElementById("fecha-hasta").value;
  const segmento = document.getElementById("filtro-segmento").value;
  const zona = document.getElementById("filtro-zona").value.toLowerCase();

  let filtered = datosCompletos.filter(lead => {
    const fecha = new Date(lead.fecha);
    const cumpleFecha = (!desde || fecha >= new Date(desde)) && (!hasta || fecha <= new Date(hasta));
    const cumpleSegmento = !segmento || lead.segmento === segmento;
    const cumpleZona = !zona || lead.zona.toLowerCase().includes(zona);
    return cumpleFecha && cumpleSegmento && cumpleZona;
  });

  renderizarTabla(filtered);
  calcularEstadisticas(filtered);
}

function limpiarFiltros() {
  document.getElementById("fecha-desde").value = "";
  document.getElementById("fecha-hasta").value = "";
  document.getElementById("filtro-segmento").value = "";
  document.getElementById("filtro-zona").value = "";
  renderizarTabla(datosCompletos);
  calcularEstadisticas(datosCompletos);
}

function exportarExcel() {
  if (datosCompletos.length === 0) {
    alert("No hay datos para exportar");
    return;
  }

  let csv = "Fecha,Nombre,Zona,Frecuencia,Volumen,Productos,Segmento,Descuento,Confianza\n";
  
  datosCompletos.forEach(lead => {
    csv += `"${new Date(lead.fecha).toLocaleDateString('es-CR')}","${lead.nombre}","${lead.zona}","${lead.frecuencia}","${lead.volumen}","${lead.productos}","${lead.segmento}","${lead.descuento}%","${lead.confianza}"\n`;
  });

  const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
  const link = document.createElement("a");
  const url = URL.createObjectURL(blob);
  link.setAttribute("href", url);
  link.setAttribute("download", `EcoPollo_Leads_${new Date().toISOString().split('T')[0]}.csv`);
  link.click();
}

// Verificar si ya está logueado
window.addEventListener("load", () => {
  const rolGuardado = localStorage.getItem("ecopollo-rol");
  if (rolGuardado === "admin" || rolGuardado === "ceo") {
    mostrarPanel(rolGuardado);
  } else if (localStorage.getItem("admin-logged") === "true") {
    mostrarPanel("admin");
  }
});

// Enter para enviar contraseña
document.getElementById("password-input")?.addEventListener("keypress", (e) => {
  if (e.key === "Enter") verificarPassword();
});
</script>

</body>
</html>
